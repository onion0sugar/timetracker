<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kontrolny - Śledzenie Czasu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Dashboard Access Login Overlay -->
    <div id="accessOverlay" class="access-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 0.5rem;">Dostęp do Panelu</h2>
            <p>Aby kontynuować, podaj hasło dostępu:</p>
            <input type="password" id="viewPasswordInput" placeholder="Hasło dostępu...">
            <button id="confirmViewBtn" style="width: 100%;">Wejdź</button>
        </div>
    </div>

    <div id="mainContainer" class="container" style="display: none;">
        <header>
            <div class="brand-header">
                <span class="brand-sk">SK</span>
                <span class="brand-timetracker">TimeTracker</span>
            </div>
            <div class="admin-controls">
                <button id="adminLoginBtn" class="btn-secondary">Zaloguj do serwisu</button>
                <button id="adminLogoutBtn" class="btn-secondary admin-only btn-danger-soft">Wyloguj</button>
            </div>
        </header>

        <div class="admin-only" style="margin-bottom: 2rem;">
            <button id="addUserBtn" class="btn-add-user">+ Dodaj Użytkownika</button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">Wszyscy</button>
            <button class="filter-btn" data-filter="Zbieranie">Zbieranie</button>
            <button class="filter-btn" data-filter="Pakowanie">Pakowanie</button>
            <button class="filter-btn" data-filter="Rozkładanie">Rozkładanie</button>
            <button class="filter-btn" data-filter="Palety">Palety</button>
            <button class="filter-btn" data-filter="Inne">Inne</button>
            <button class="filter-btn" data-filter="none">Pozostałe</button>
        </div>

        <div id="userGrid" class="user-grid">
            <!-- User cards will be loaded here -->
        </div>
    </div>
    <!-- Edit/Add User Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Edycja użytkownika</h3>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7;">Imię:</label>
                <input type="text" id="editUserGivenNameInput" placeholder="Imię (np. Jan)...">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7;">WMS login:</label>
                <input type="text" id="editUserNameInput" placeholder="Login WMS (np. jkowalski)...">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7;">Kategoria:</label>
                <select id="editUserCategoryInput" style="width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;">
                    <option value="">Brak kategorii</option>
                    <option value="Zbieranie">Zbieranie</option>
                    <option value="Pakowanie">Pakowanie</option>
                    <option value="Rozkładanie">Rozkładanie</option>
                    <option value="Palety">Palety</option>
                    <option value="Inne">Inne</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="confirmEditBtn">Zapisz zmiany</button>
                <button id="cancelEditBtn" class="btn-secondary">Anuluj</button>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3>Logowanie serwisowe</h3>
            <p>Podaj hasło, aby uzyskać dostęp do funkcji administratora:</p>
            <input type="password" id="adminPasswordInput" placeholder="Hasło...">
            <div class="modal-actions">
                <button id="confirmLoginBtn" class="btn-danger">Zaloguj</button>
                <button id="cancelLoginBtn" class="btn-secondary">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="sse-status">Połączenie utracone - próba odnowienia...</div>
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
