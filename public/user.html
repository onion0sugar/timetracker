<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twój Przełącznik - Śledzenie Czasu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container switch-view">
        <h1 id="userNameHeading">Ładowanie...</h1>

        <div class="switch-container">
            <div id="timer" class="timer-display">00:00:00</div>

            <div class="switch-rack">
                <div id="slider" class="switch-slider pos0"></div>
                <div class="switch-option" onclick="setPos(0, 'OFF')">OFF</div>
                <div class="switch-option" onclick="setPos(1, 'Pakowanie')">Pakowanie</div>
                <div class="switch-option" onclick="setPos(2, 'Zbieranie')">Zbieranie</div>
                <div class="switch-option" onclick="setPos(3, 'Przerwa')">Przerwa</div>
                <div class="switch-option" onclick="setPos(4, 'Rozkladanie')">Rozkladanie</div>
            </div>

            <!-- Mobile Rotary Knob -->
            <div class="knob-wrapper" id="knobWrapper">
                <svg id="knobSvg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;touch-action:none;">
                    <circle cx="150" cy="150" r="143" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <!-- Sectors -->
                    <path class="knob-sector" data-pos="0" data-state="OFF"
                          d="M 110.86 91.97 L 76.19 40.57 A 132 132 0 0 1 223.81 40.57 L 189.14 91.97 A 70 70 0 0 0 110.86 91.97 Z"
                          fill="#95a5a6"/>
                    <path class="knob-sector" data-pos="1" data-state="Pakowanie"
                          d="M 193.10 94.84 L 231.27 45.98 A 132 132 0 0 1 276.89 186.38 L 217.29 169.30 A 70 70 0 0 0 193.10 94.84 Z"
                          fill="#3498db"/>
                    <path class="knob-sector" data-pos="2" data-state="Zbieranie"
                          d="M 215.78 173.94 L 274.04 195.15 A 132 132 0 0 1 159.21 281.88 L 154.88 219.83 A 70 70 0 0 0 215.78 173.94 Z"
                          fill="#f1c40f"/>
                    <path class="knob-sector" data-pos="3" data-state="Przerwa"
                          d="M 147.56 219.96 L 145.39 281.92 A 132 132 0 0 1 25.96 195.15 L 84.22 173.94 A 70 70 0 0 0 147.56 219.96 Z"
                          fill="#e67e22"/>
                    <path class="knob-sector" data-pos="4" data-state="Rozkladanie"
                          d="M 82.71 169.30 L 23.11 186.38 A 132 132 0 0 1 68.73 45.98 L 106.90 94.84 A 70 70 0 0 0 82.71 169.30 Z"
                          fill="#9b59b6"/>
                    <!-- Outer ring -->
                    <circle cx="150" cy="150" r="133" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                    <!-- Labels -->
                    <text x="150" y="48" class="knob-label" text-anchor="middle" dominant-baseline="middle">OFF</text>
                    <text x="249" y="118" class="knob-label" text-anchor="middle" dominant-baseline="middle">Pak.</text>
                    <text x="210" y="233" class="knob-label" text-anchor="middle" dominant-baseline="middle">Zbier.</text>
                    <text x="90"  y="233" class="knob-label" text-anchor="middle" dominant-baseline="middle">Prz.</text>
                    <text x="51"  y="118" class="knob-label" text-anchor="middle" dominant-baseline="middle">Rozk.</text>
                    <!-- Center circle -->
                    <circle id="knobCenterCircle" cx="150" cy="150" r="68" fill="rgba(19,15,64,0.92)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
                    <!-- Needle -->
                    <g id="knobNeedle" style="transform-origin:150px 150px;transform:rotate(0deg);transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1)">
                        <polygon points="150,95 145,150 155,150" fill="white" opacity="0.95"/>
                        <circle cx="150" cy="150" r="7" fill="white"/>
                    </g>
                    <!-- Center label -->
                    <text id="knobStateText" x="150" y="162" text-anchor="middle" dominant-baseline="middle" class="knob-center-text">OFF</text>
                </svg>
            </div>

            <div id="currentStateName" style="font-size: 1.2rem; font-weight: 600; color: rgba(255,255,255,0.7)">
                Stan: OFF
            </div>
        </div>

        <div style="margin-top: 3rem;">
            <h3>Ostatnie aktywności</h3>
            <div id="logHistory" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <!-- Logs will be loaded here -->
            </div>
        </div>
    </div>
    <div id="sse-status">Połączenie utracone - próba odnowienia...</div>
    <div id="toast-container"></div>

    <script src="app.js"></script>
    <script>
        // Specific logic for user.html
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            if (userId) {
                startUserRefresh(userId);
            }
            initKnobInteraction();
        });
    </script>
</body>

</html>
